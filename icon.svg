<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Base App Icon Shape (Rounded Rectangle) -->
  <rect x="32" y="32" width="448" height="448" rx="100" ry="100" fill="#000000" />
  
  <!-- Subtle Terminal Window Header -->
  <path d="M32 132 Q32 32 132 32 L380 32 Q480 32 480 132 L480 140 L32 140 Z" fill="#1A1A1A" />
  <circle cx="80" cy="86" r="12" fill="#FF5F56" />
  <circle cx="120" cy="86" r="12" fill="#FFBD2E" />
  <circle cx="160" cy="86" r="12" fill="#27C93F" />

  <!-- Terminal Prompt ">" -->
  <polyline points="100,220 180,280 100,340" fill="none" stroke="#FFFFFF" stroke-width="40" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Push Arrow (Replacing the underscore) -->
  <line x1="260" y1="340" x2="260" y2="180" stroke="#F14E32" stroke-width="40" stroke-linecap="round" />
  <polyline points="200,240 260,180 320,240" fill="none" stroke="#F14E32" stroke-width="40" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Git Node Circle at the base of the arrow -->
  <circle cx="260" cy="340" r="30" fill="#000000" stroke="#F14E32" stroke-width="20" />
</svg>
